name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (elixir ${{ matrix.elixir }} / otp ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - elixir: '1.19'
            otp: '28'
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps + build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      - name: Cache BPE rank files
        id: ranks-cache
        uses: actions/cache@v4
        with:
          path: priv/ranks
          key: tiktoken-ranks-cl100k-o200k

      - name: Download BPE rank files
        if: steps.ranks-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p priv/ranks
          curl -sSL "https://openaipublic.blob.core.windows.net/encodings/cl100k_base.tiktoken" -o priv/ranks/cl100k_base.tiktoken
          curl -sSL "https://openaipublic.blob.core.windows.net/encodings/o200k_base.tiktoken" -o priv/ranks/o200k_base.tiktoken

      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix compile --warnings-as-errors
      - run: mix test
